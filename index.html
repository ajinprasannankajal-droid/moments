<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MOMENTS YSS</title> <!--[cite: 2] -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; } /*[cite: 2] */
    
    html, body {
      height: 100%;
      width: 100%;
    } /*[cite: 2] */

    body { 
      background: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%); 
      color: #0f172a; 
      display: flex;
      justify-content: center;
      align-items: center;
    } /*[cite: 2] */

    /* ലോഗിൻ ബോക്സ് സ്റ്റൈൽ */
    .login { 
      width: 90%; 
      max-width: 380px; 
      background: rgba(255, 255, 255, 0.9); 
      backdrop-filter: blur(10px);
      padding: 35px 30px; 
      border-radius: 20px; 
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08); 
      border: 1px solid rgba(255, 255, 255, 0.6);
      text-align: center; 
    } /*[cite: 2] */
    
    /* ലോഗോ സ്റ്റൈൽ */
    .logo-area {
      width: 100px;
      height: 100px;
      margin: 0 auto 20px auto;
      background: white;
      border-radius: 50%;
      padding: 5px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    } /*[cite: 2] */

    .login h2 {
      font-size: 1.5rem;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 8px;
    } /*[cite: 2] */

    .login p {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 25px;
    } /*[cite: 2] */
    
    .input-group {
      text-align: left;
      margin-bottom: 18px;
    } /*[cite: 2] */

    .input-group label {
      font-size: 12px;
      font-weight: 600;
      color: #475569;
      display: block;
      margin-bottom: 6px;
      text-transform: uppercase;
    } /*[cite: 2] */

    input[type="password"] { 
      width: 100%; 
      padding: 14px 16px; 
      font-size: 15px;
      color: #0f172a;
      background: #ffffff;
      border: 1px solid #cbd5e1; 
      border-radius: 10px; 
      outline: none;
    } /*[cite: 2] */
    
    input[type="password"]:focus {
      border-color: #16a34a;
      box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.15);
    } /*[cite: 2] */
    
    button.btn-login { 
      width: 100%; 
      padding: 14px; 
      background: #16a34a; 
      color: white !important; 
      border: none; 
      border-radius: 10px; 
      cursor: pointer; 
      font-size: 15px;
      font-weight: 700; 
      box-shadow: 0 4px 12px rgba(22, 163, 74, 0.2);
    } /*[cite: 2] */
    
    button.btn-login:hover { 
      background: #15803d;
    } /*[cite: 2] */
    
    #msg { 
      color: #dc2626; 
      margin-top: 15px; 
      font-size: 13px;
      font-weight: 600; 
    } /*[cite: 2] */
    
    /* ഡാഷ്‌ബോർഡ് മോഡ് */
    .dashboard-mode {
      display: block !important;
      width: 100% !important;
      height: 100vh !important;
      background: #f4f6f9;
    } /*[cite: 2] */

    .member-avatar { 
      width: 40px; 
      height: 40px; 
      border-radius: 50%; 
      object-fit: cover; 
      margin-right: 12px; 
    } /*[cite: 2] */
    .search-box {
      width: 100%;
      padding: 12px;
      margin: 15px 0;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
    } /*[cite: 2] */
    .loan-summary-box { display: flex; gap: 12px; margin: 15px 0; flex-wrap: wrap; } /*[cite: 2] */
    .loan-summary-card {
      flex: 1; min-width: 140px; background: #fff; padding: 15px; border-radius: 8px; 
      text-align: center; border: 1px solid #e2e8f0; font-size: 13px;
    } /*[cite: 2] */
  </style>
</head>
<body>

  <!-- ലോഗിൻ ബോക്സ് -->
  <div class="login" id="login-box"> <!--[cite: 2] -->
    <div class="logo-area"> <!--[cite: 2] -->
      <svg viewBox="0 0 100 100" style="width: 80px; height: 80px;">
        <path d="M20,80 L20,20 L45,55 L70,20 L70,80" fill="none" stroke="#334155" stroke-width="8" stroke-linejoin="round"/>
        <path d="M30,85 Q55,40 80,45" fill="none" stroke="#16a34a" stroke-width="4"/>
        <path d="M15,65 Q45,60 70,15" fill="none" stroke="#475569" stroke-width="2"/>
      </svg>
    </div>
    <h2>MOMENTS YSS</h2> <!--[cite: 2] -->
    <p>Financial Management Portal</p> <!--[cite: 2] -->
    
    <div class="input-group"> <!--[cite: 2] -->
      <label for="pass">Security Password</label> <!--[cite: 2] -->
      <input type="password" id="pass" placeholder="••••••••" onkeypress="if(event.key === 'Enter') login()"> <!--[cite: 2] -->
    </div>
    
    <button onclick="login()" class="btn-login">Secure Login</button> <!--[cite: 2] -->
    <div id="msg"></div> <!--[cite: 2] -->
  </div>

  <!-- ഡാഷ്‌ബോർഡ് കണ്ടെയ്നർ -->
  <div id="dashboard-container" style="width: 100%; display: none;"></div> <!--[cite: 2] -->

  <script>
    // നിങ്ങളുട പുതിയ ഗൂഗിൾ ആപ്പ് സ്ക്രിപ്റ്റ് വെബ് ആപ്പ് URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw4m6KkYDZ8YiWnEqm8uJ2hyvTs_BY53g4Q42McGi7JNNJQ6AiIyr1Wb2W7ApJJ4PyZ/exec";

    window.allMembers = []; //[cite: 2]
    window.currentLoanData = []; //[cite: 2]
    window.currentChittyData = []; //[cite: 2]
    window.currentOnamMonthlyData = []; //[cite: 2]
    window.currentLoanTitle = ""; //[cite: 2]

    window.onload = function() {
      if (localStorage.getItem("isLoggedIn") === "true") {
        loadDashboard(); //[cite: 2]
      }
    };

    function login() {
      var passwordInput = document.getElementById("pass").value; //[cite: 2]
      var msgDiv = document.getElementById("msg"); //[cite: 2]
      msgDiv.innerHTML = "Authenticating... ⏳"; //[cite: 2]
      msgDiv.style.color = "#16a34a"; //[cite: 2]
      
      fetch(`${SCRIPT_URL}?action=checkLogin&password=${encodeURIComponent(passwordInput)}`)
        .then(response => response.json())
        .then(data => {
          if (data.success) { 
            localStorage.setItem("isLoggedIn", "true"); //[cite: 2]
            msgDiv.innerHTML = ""; //[cite: 2]
            loadDashboard(); //[cite: 2]
          } else { 
            msgDiv.innerHTML = "Wrong Password ❌"; //[cite: 2]
            msgDiv.style.color = "#dc2626"; //[cite: 2]
          }
        })
        .catch(err => {
          msgDiv.innerHTML = "Error: " + err.message; //[cite: 2]
          msgDiv.style.color = "#dc2626"; //[cite: 2]
        });
    }

    function logout() {
      localStorage.removeItem("isLoggedIn"); //[cite: 2]
      document.body.classList.remove("dashboard-mode"); //[cite: 2]
      document.getElementById("dashboard-container").innerHTML = ""; //[cite: 2]
      document.getElementById("dashboard-container").style.display = "none"; //[cite: 2]
      document.getElementById("pass").value = ""; //[cite: 2]
      document.getElementById("msg").innerHTML = ""; //[cite: 2]
      document.getElementById("login-box").style.display = "block"; //[cite: 2]
    }

    function loadDashboard() {
      var loginBox = document.getElementById("login-box"); //[cite: 2]
      if(loginBox) {
        loginBox.style.display = "none"; //[cite: 2]
      }
      document.body.classList.add("dashboard-mode"); //[cite: 2]
      
      var dashContainer = document.getElementById("dashboard-container"); //[cite: 2]
      dashContainer.innerHTML = "<h3 style='padding:40px; text-align:center; color:#16a34a;'>🔑 Entering Secure Portal, please wait...</h3>"; //[cite: 2]
      dashContainer.style.display = "block"; //[cite: 2]

      fetch('dashboard.html')
        .then(response => response.text())
        .then(htmlCode => {
          dashContainer.innerHTML = htmlCode; //[cite: 2]
          showPage('dashboard'); //[cite: 2]
          fetchDashboardDetails(); //[cite: 2]
        })
        .catch(err => {
          dashContainer.innerHTML = "<h3 style='color:red; text-align:center;'>Failed to load dashboard: " + err.message + "</h3>"; //[cite: 2]
        });
    }

    function fetchDashboardDetails() {
      fetch(`${SCRIPT_URL}?action=getDashboardData`)
        .then(response => response.json())
        .then(res => {
          window.allMembers = res.members; //[cite: 2]
          showMembers(res.members); //[cite: 2]
          
          var totalWeeklySavings = 0; //[cite: 2]
          res.members.forEach(function(m) {
            totalWeeklySavings += Number(m.saving) || 0; //[cite: 2]
          });
          
          var personalProfit = Number(res.personalProfit) || 0; //[cite: 2]
          var tripAvailable = Number(res.tripAvailableBalance) || 50000; //[cite: 2]
          
          var finalTotalFund = totalWeeklySavings + personalProfit + tripAvailable; //[cite: 2]
          
          if (document.getElementById("totalFund")) {
            document.getElementById("totalFund").innerHTML = "₹" + finalTotalFund.toLocaleString('en-IN'); //[cite: 2]
          }

          if (document.getElementById("totalFundBreakup")) {
            document.getElementById("totalFundBreakup").innerHTML = //[cite: 2]
              'Savings: <b>₹' + totalWeeklySavings.toLocaleString('en-IN') + '</b> | ' + //[cite: 2]
              'PL Profit: <b>₹' + personalProfit.toLocaleString('en-IN') + '</b> | ' + //[cite: 2]
              'Trip In Hand: <b>₹' + tripAvailable.toLocaleString('en-IN') + '</b>'; //[cite: 2]
          }
        });
    }

    function showMembers(data) {
      var html = ""; //[cite: 2]
      var total = 0; //[cite: 2]
      data.forEach(function(m) {
        total += Number(m.saving) || 0; //[cite: 2]
        var imgUrl = "https://www.w3schools.com/howto/img_avatar.png"; //[cite: 2]
        if (m.photo && m.photo.includes("drive.google.com")) {
          var fileId = ""; //[cite: 2]
          if (m.photo.includes("/d/")) { fileId = m.photo.split("/d/")[1].split("/")[0]; } //[cite: 2]
          else if (m.photo.includes("id=")) { fileId = m.photo.split("id=")[1].split("&")[0]; } //[cite: 2]
          if (fileId) { imgUrl = "https://lh3.googleusercontent.com/d/" + fileId; } //[cite: 2]
        } else if (m.photo) { imgUrl = m.photo; } //[cite: 2]

        html += '<tr>' + //[cite: 2]
                  '<td style="font-weight: normal; color: #475569;">' + m.id + '</td>' + //[cite: 2]
                  '<td style="display:flex; align-items:center;">' + //[cite: 2]
                    '<img src="' + imgUrl + '" class="member-avatar" onerror="this.src=\'https://www.w3schools.com/howto/img_avatar.png\'">' + //[cite: 2]
                    '<span style="font-weight:bold; color:#0f172a;">' + m.name + '</span>' + //[cite: 2]
                  '</td>' + //[cite: 2]
                  '<td style="font-weight:bold; color:#16a34a;">₹' + Number(m.saving).toLocaleString('en-IN') + '</td>' + //[cite: 2]
                '</tr>'; //[cite: 2]
      });
      if (document.getElementById("members")) document.getElementById("members").innerHTML = html; //[cite: 2]
      if (document.getElementById("totalSaving")) document.getElementById("totalSaving").innerHTML = "₹" + total.toLocaleString('en-IN'); //[cite: 2]
      if (document.getElementById("memberCount")) document.getElementById("memberCount").innerHTML = data.length; //[cite: 2]
    }

    function searchMember() {
      var txt = document.getElementById("search").value.toLowerCase(); //[cite: 2]
      var filtered = window.allMembers.filter(function(m) { //[cite: 2]
        return m.name.toLowerCase().includes(txt) || String(m.id).toLowerCase().includes(txt); //[cite: 2]
      });
      showMembers(filtered); //[cite: 2]
    }

    function showPage(page) {
      var mainDashboard = document.getElementById("main-dashboard-content"); //[cite: 2]
      var pageDiv = document.getElementById("page"); //[cite: 2]
      if (page == "dashboard") {
        if (mainDashboard) mainDashboard.style.display = "block"; //[cite: 2]
        if (pageDiv) pageDiv.innerHTML = ""; //[cite: 2]
        if (window.allMembers && window.allMembers.length > 0) showMembers(window.allMembers); //[cite: 2]
        return;
      }
      if (mainDashboard) mainDashboard.style.display = "none"; //[cite: 2]
      pageDiv.innerHTML = "<h3 style='padding:20px; text-align:center; color:#64748b;'>🔄 Loading Data...</h3>"; //[cite: 2]

      if (page == "onam") {
        fetch(`${SCRIPT_URL}?action=getOnamLoanTotal`)
          .then(res => res.json())
          .then(res => { window.currentLoanData = res.data; window.currentLoanTitle = "Onam Fund Loan"; showGenericLoan(res, "Onam Fund Loan"); }); //[cite: 2]
      } else if (page == "onamMonthly") {
        fetch(`${SCRIPT_URL}?action=getOnamMonthlyTotal`)
          .then(res => res.json())
          .then(res => { window.currentOnamMonthlyData = res.data; showOnamMonthly(res); }); //[cite: 2]
      } else if (page == "personal") {
        fetch(`${SCRIPT_URL}?action=getPersonalLoanTotal`)
          .then(res => res.json())
          .then(res => { window.currentLoanData = res.data; window.currentLoanTitle = "Personal Loan"; showGenericLoan(res, "Personal Loan"); }); //[cite: 2]
      } else if (page == "trip") {
        fetch(`${SCRIPT_URL}?action=getTripLoanTotal`)
          .then(res => res.json())
          .then(res => { window.currentLoanData = res.data; window.currentLoanTitle = "Trip Fund Loan"; showGenericLoan(res, "Trip Fund Loan"); }); //[cite: 2]
      } else if (page == "chitty") {
        fetch(`${SCRIPT_URL}?action=getChittyTotal`)
          .then(res => res.json())
          .then(res => { window.currentChittyData = res.data; showChittyFund(res); }); //[cite: 2]
      }
    }

    function searchLoan() {
      var txt = document.getElementById("loanSearch").value.toLowerCase(); //[cite: 2]
      var filtered = window.currentLoanData.filter(function(l) { //[cite: 2]
        return l.name.toLowerCase().includes(txt) || String(l.memberId).toLowerCase().includes(txt) || String(l.loanId).toLowerCase().includes(txt); //[cite: 2]
      });
      renderLoanTableRows(filtered); //[cite: 2]
    }

    function showGenericLoan(result, title) {
      if (!result || !result.data) return; //[cite: 2]
      var interestHeader = title === "Onam Fund Loan" ? "Interest 5%" : (title === "Personal Loan" ? "Interest 1%" : "Interest 3%"); //[cite: 2]
      var summaryCardsHtml = ""; //[cite: 2]
      
      if (title === "Onam Fund Loan") {
        summaryCardsHtml = //[cite: 2]
          '<div class="loan-summary-card"><p>Total Monthly Fund</p><h3>₹' + Number(result.totalMonthlyFund || 0).toLocaleString('en-IN') + '</h3></div>' + //[cite: 2]
          '<div class="loan-summary-card"><p>Total Issued</p><h3 style="color:#2563eb;">₹' + Number(result.total).toLocaleString('en-IN') + '</h3></div>' + //[cite: 2]
          '<div class="loan-summary-card" style="background:#f0fdf4;"><p>Available Balance</p><h3 style="color:#16a34a;">₹' + Number(result.availableBalance || 0).toLocaleString('en-IN') + '</h3></div>' + //[cite: 2]
          '<div class="loan-summary-card" style="background:#fffbeb;"><p>Loan Profit</p><h3 style="color:#d97706;">₹' + Number(result.totalProfit).toLocaleString('en-IN') + '</h3></div>'; //[cite: 2]
      } else if (title === "Trip Fund Loan") {
        summaryCardsHtml = //[cite: 2]
          '<div class="loan-summary-card"><p>Total Trip Capital</p><h3>₹' + Number(result.totalTripCapital || 50000).toLocaleString('en-IN') + '</h3></div>' + //[cite: 2]
          '<div class="loan-summary-card"><p>Active Balance</p><h3 style="color:#ef4444;">₹' + Number(result.totalBalance).toLocaleString('en-IN') + '</h3></div>' + //[cite: 2]
          '<div class="loan-summary-card" style="background:#f0fdf4;"><p>Available Balance</p><h3 style="color:#16a34a;">₹' + Number(result.availableBalance || 0).toLocaleString('en-IN') + '</h3></div>' + //[cite: 2]
          '<div class="loan-summary-card" style="background:#fffbeb;"><p>Loan Profit</p><h3 style="color:#d97706;">₹' + Number(result.totalProfit).toLocaleString('en-IN') + '</h3></div>'; //[cite: 2]
      } else {
        summaryCardsHtml = //[cite: 2]
          '<div class="loan-summary-card"><p>Total Issued</p><h3 style="color:#2563eb;">₹' + Number(result.total).toLocaleString('en-IN') + '</h3></div>' + //[cite: 2]
          '<div class="loan-summary-card"><p>Total Repaid</p><h3 style="color:#16a34a;">₹' + Number(result.totalRepaid).toLocaleString('en-IN') + '</h3></div>' + //[cite: 2]
          '<div class="loan-summary-card"><p>Total Balance</p><h3 style="color:#ef4444;">₹' + Number(result.totalBalance).toLocaleString('en-IN') + '</h3></div>' + //[cite: 2]
          '<div class="loan-summary-card" style="background:#f0fdf4;"><p>Total Profit</p><h3 style="color:#16a34a;">₹' + Number(result.totalProfit).toLocaleString('en-IN') + '</h3></div>'; //[cite: 2]
      }

      document.getElementById("page").innerHTML = //[cite: 2]
        '<h2 style="margin:15px 0;">' + title + '</h2>' + //[cite: 2]
        '<div class="loan-summary-box">' + //[cite: 2]
          summaryCardsHtml + //[cite: 2]
          '<div class="loan-summary-card">Count<p>Act: <b style="color:#ef4444;">' + result.active + '</b> | Cls: <b style="color:#16a34a;">' + result.closed + '</b></p></div>' + //[cite: 2]
        '</div>' + //[cite: 2]
        '<input type="text" id="loanSearch" class="search-box" onkeyup="searchLoan()" placeholder="Search...">' + //[cite: 2]
        '<div style="overflow-x:auto;background:white;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,0.1);">' + //[cite: 2]
          '<table style="width:100%;min-width:800px;">' + //[cite: 2]
            '<thead>' + //[cite: 2]
              '<tr style="background:#16a34a;color:#fff;">' + //[cite: 2]
                '<th style="padding:10px;">Date</th>' + //[cite: 2]
                '<th style="padding:10px;">Loan ID</th>' + //[cite: 2]
                '<th style="padding:10px;">Mem ID</th>' + //[cite: 2]
                '<th style="padding:10px;">Name</th>' + //[cite: 2]
                '<th style="padding:10px;">Amount</th>' + //[cite: 2]
                '<th style="padding:10px;">Months</th>' + //[cite: 2]
                '<th style="padding:10px;">' + interestHeader + '</th>' + //[cite: 2]
                '<th style="padding:10px;">Fine</th>' + //[cite: 2]
                '<th style="padding:10px;">Total Pay</th>' + //[cite: 2]
                '<th style="padding:10px;">Repaid</th>' + //[cite: 2]
                '<th style="padding:10px;">Balance</th>' + //[cite: 2]
                '<th style="padding:10px;">Closing Date</th>' + //[cite: 2]
                '<th style="padding:10px;">Status</th>' + //[cite: 2]
              '</tr>' + //[cite: 2]
            '</thead>' + //[cite: 2]
            '<tbody id="loanTableBody"></tbody>' + //[cite: 2]
          '</table>' + //[cite: 2]
        '</div>'; //[cite: 2]
      
      renderLoanTableRows(result.data); //[cite: 2]
    }

    function renderLoanTableRows(data) {
      var html = ""; //[cite: 2]
      data.forEach(function(l) {
        var isAct = String(l.status).toLowerCase().trim() === 'active'; //[cite: 2]
        var balanceColor = l.balance > 0 ? '#b91c1c' : '#16a34a'; //[cite: 2]
        var statusBg = isAct ? '#ef4444' : '#16a34a'; //[cite: 2]

        html += '<tr>' + //[cite: 2]
                  '<td>' + (l.date || '') + '</td>' + //[cite: 2]
                  '<td>' + (l.loanId || '') + '</td>' + //[cite: 2]
                  '<td>' + (l.memberId || '') + '</td>' + //[cite: 2]
                  '<td style="font-weight:bold;">' + (l.name || '') + '</td>' + //[cite: 2]
                  '<td>₹' + Number(l.amount).toLocaleString('en-IN') + '</td>' + //[cite: 2]
                  '<td>' + (l.months || 0) + '</td>' + //[cite: 2]
                  '<td>₹' + Number(l.interest).toLocaleString('en-IN') + '</td>' + //[cite: 2]
                  '<td>₹' + Number(l.fine || 0).toLocaleString('en-IN') + '</td>' + //[cite: 2]
                  '<td style="color:#2563eb;font-weight:bold;">₹' + Number(l.totalPay).toLocaleString('en-IN') + '</td>' + //[cite: 2]
                  '<td>₹' + Number(l.repaid).toLocaleString('en-IN') + '</td>' + //[cite: 2]
                  '<td style="font-weight:bold;color:' + balanceColor + ';">₹' + Number(l.balance).toLocaleString('en-IN') + '</td>' + //[cite: 2]
                  '<td>' + (l.closingDate || '') + '</td>' + //[cite: 2]
                  '<td><span style="padding:4px 8px;border-radius:4px;color:#fff;font-size:11px;font-weight:bold;background:' + statusBg + '">' + l.status + '</span></td>' + //[cite: 2]
                '</tr>'; //[cite: 2]
      });
      document.getElementById("loanTableBody").innerHTML = html; //[cite: 2]
    }

    function searchChitty() {
      var txt = document.getElementById("chittySearch").value.toLowerCase(); //[cite: 2]
      var filtered = window.currentChittyData.filter(function(c) { //[cite: 2]
        return c.name.toLowerCase().includes(txt) || String(c.memberId).toLowerCase().includes(txt); //[cite: 2]
      });
      renderChittyTableRows(filtered); //[cite: 2]
    }

    function showChittyFund(result) {
      if (!result || !result.data) return; //[cite: 2]
      var totalVal = Number(result.total || 0).toLocaleString('en-IN'); //[cite: 2]

      document.getElementById("page").innerHTML = //[cite: 2]
        '<h2 style="margin:15px 0;">Chitti Fund Details</h2>' + //[cite: 2]
        '<input type="text" id="chittySearch" class="search-box" onkeyup="searchChitty()" placeholder="Search...">' + //[cite: 2]
        '<div style="margin:15px 0;background:#fff;padding:15px;border-radius:8px;border:1px solid #e2e8f0;">' + //[cite: 2]
          '<p><b>Total Collected:</b> <span style="color:#16a34a;font-weight:bold;">₹' + totalVal + '</span></p>' + //[cite: 2]
        '</div>' + //[cite: 2]
        '<div style="overflow-x:auto;background:white;border-radius:8px;">' + //[cite: 2]
          '<table style="width:100%;min-width:500px;">' + //[cite: 2]
            '<thead>' + //[cite: 2]
              '<tr style="background:#16a34a;color:#fff;">' + //[cite: 2]
                '<th style="padding:10px;">Member ID</th>' + //[cite: 2]
                '<th style="padding:10px;">Name</th>' + //[cite: 2]
                '<th style="padding:10px;">Installment No</th>' + //[cite: 2]
                '<th style="padding:10px;">Amount Paid</th>' + //[cite: 2]
                '<th style="padding:10px;">Remarks</th>' + //[cite: 2]
              '</tr>' + //[cite: 2]
            '</thead>' + //[cite: 2]
            '<tbody id="chittyTableBody"></tbody>' + //[cite: 2]
          '</table>' + //[cite: 2]
        '</div>'; //[cite: 2]
      
      renderChittyTableRows(result.data); //[cite: 2]
    }

    function renderChittyTableRows(data) {
      var html = ""; //[cite: 2]
      data.forEach(function(c) { 
        var amtPaid = Number(c.amountPaid || 0).toLocaleString('en-IN'); //[cite: 2]
        html += '<tr>' + //[cite: 2]
                  '<td>' + (c.memberId || '') + '</td>' + //[cite: 2]
                  '<td style="font-weight:bold;">' + (c.name || '') + '</td>' + //[cite: 2]
                  '<td>' + (c.installment || '') + '</td>' + //[cite: 2]
                  '<td style="color:#16a34a;font-weight:bold;">₹' + amtPaid + '</td>' + //[cite: 2]
                  '<td>' + (c.remarks || '') + '</td>' + //[cite: 2]
                '</tr>';  //[cite: 2]
      });
      document.getElementById("chittyTableBody").innerHTML = html; //[cite: 2]
    }

    function searchOnamMonthly() {
      var txt = document.getElementById("onamMonthlySearch").value.toLowerCase(); //[cite: 2]
      var filtered = window.currentOnamMonthlyData.filter(function(o) { //[cite: 2]
        return o.name.toLowerCase().includes(txt) || String(o.memberId).toLowerCase().includes(txt); //[cite: 2]
      });
      renderOnamMonthlyTableRows(filtered); //[cite: 2]
    }

    function showOnamMonthly(result) {
      if (!result || !result.data) return; //[cite: 2]
      var totalVal = Number(result.total || 0).toLocaleString('en-IN'); //[cite: 2]

      document.getElementById("page").innerHTML = //[cite: 2]
        '<h2 style="margin:15px 0;">Onam Fund Monthly 1000</h2>' + //[cite: 2]
        '<input type="text" id="onamMonthlySearch" class="search-box" onkeyup="searchOnamMonthly()" placeholder="Search...">' + //[cite: 2]
        '<div style="margin:15px 0;background:#fff;padding:15px;border-radius:8px;border:1px solid #e2e8f0;">' + //[cite: 2]
          '<p><b>Total Collected:</b> <span style="color:#16a34a;font-weight:bold;">₹' + totalVal + '</span></p>' + //[cite: 2]
        '</div>' + //[cite: 2]
        '<div style="overflow-x:auto;background:white;border-radius:8px;">' + //[cite: 2]
          '<table style="width:100%;min-width:500px;">' + //[cite: 2]
            '<thead>' + //[cite: 2]
              '<tr style="background:#16a34a;color:#fff;">' + //[cite: 2]
                '<th style="padding:10px;">Member ID</th>' + //[cite: 2]
                '<th style="padding:10px;">Name</th>' + //[cite: 2]
                '<th style="padding:10px;">Fine</th>' + //[cite: 2]
                '<th style="padding:10px;">Total Paid</th>' + //[cite: 2]
              '</tr>' + //[cite: 2]
            '</thead>' + //[cite: 2]
            '<tbody id="onamMonthlyTableBody"></tbody>' + //[cite: 2]
          '</table>' + //[cite: 2]
        '</div>'; //[cite: 2]
      
      renderOnamMonthlyTableRows(result.data); //[cite: 2]
    }

    function renderOnamMonthlyTableRows(data) {
      var html = ""; //[cite: 2]
      data.forEach(function(o) { 
        var fineVal = Number(o.fine || 0).toLocaleString('en-IN'); //[cite: 2]
        var totalVal = Number(o.total || 0).toLocaleString('en-IN'); //[cite: 2]
        html += '<tr>' + //[cite: 2]
                  '<td>' + (o.memberId || '') + '</td>' + //[cite: 2]
                  '<td style="font-weight:bold;">' + (o.name || '') + '</td>' + //[cite: 2]
                  '<td style="color:#ef4444;">₹' + fineVal + '</td>' + //[cite: 2]
                  '<td style="color:#16a34a;font-weight:bold;">₹' + totalVal + '</td>' + //[cite: 2]
                '</tr>';  //[cite: 2]
      });
      document.getElementById("onamMonthlyTableBody").innerHTML = html; //[cite: 2]
    }
  </script>
</body>
