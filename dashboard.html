<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard - MOMENTS YSS</title>
</head>
<body>
  <!-- നിങ്ങളുടെ ഡാഷ്ബോർഡ് ഡിസൈൻ ഇവിടെ -->

  <script>
    // ലോഗിൻ പരിശോധന
    if (localStorage.getItem("isLoggedIn") !== "true") {
      window.location.href = "index.html";
    }

    // പുതിയ ലിങ്ക് ഇവിടെയും അപ്‌ഡേറ്റ് ചെയ്തു
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwgqBrTtyMbFqd8PoBq-X5DxKHQ3mdlDqQJS_RCZqD9WTgLEzJil4GPlGov9sCmgM2g/exec";

    function logout() {
      localStorage.removeItem("isLoggedIn");
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
